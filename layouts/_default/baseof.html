<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤟</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="/" class="logo">{{ .Site.Title }}</a>
                <div class="nav-links">
                    <a href="/about">About</a>
                    <a href="/experience">Experience</a>
                    <a href="/blog">Blog</a>
                    <a href="https://github.com/srivatsav" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://linkedin.com/in/srivatsav-gorti" target="_blank" rel="noopener">LinkedIn</a>
                </div>
            </nav>
        </header>
        
        {{ block "main" . }}{{ end }}
        
        <footer>
            <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
